services:
  postgres:
    image: postgres:16-alpine
    expose: ["5432"]
    environment:
      POSTGRES_DB: inaiurai
      POSTGRES_USER: inaiurai
      POSTGRES_PASSWORD: localdev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inaiurai"]
      interval: 5s
      retries: 5
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    expose: ["6379"]

  backend:
    build: ./backend
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    environment:
      DATABASE_URL: postgres://inaiurai:localdev@postgres:5432/inaiurai?sslmode=disable
      ENGINE_URL: http://engine:8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?Set INTERNAL_API_KEY in .env}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      EMAIL_DOMAIN: ${EMAIL_DOMAIN:-inaiurai.com}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      PORT: 8080

  engine:
    build: ./engine
    expose: ["8000"]
    env_file: [.env]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SERPER_API_KEY: ${SERPER_API_KEY}
      BACKEND_URL: http://backend:8080
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?Set INTERNAL_API_KEY in .env}
      INTERNAL_API_KEY_PREVIOUS: ${INTERNAL_API_KEY_PREVIOUS:-}
      LOG_FORMAT: json
      MAX_CONCURRENT_TASKS: ${MAX_CONCURRENT_TASKS:-15}
      AUDIT_FALLBACK_DIR: /tmp/audit_fallback
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    volumes:
      - audit_fallback:/tmp/audit_fallback

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080/ws/chat}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}

volumes:
  pgdata:
  audit_fallback:
